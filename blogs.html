<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PYQPaper Blog</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

/* Header */

header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

/* Container */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* Blog card */

.blog{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
transition:0.2s;
}

.blog:hover{
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.blog a{
text-decoration:none;
color:#0d6efd;
font-size:20px;
font-weight:bold;
}

.blog p{
color:#555;
margin-top:8px;
font-size:15px;
}
/* Back button */

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#0d6efd;
font-weight:bold;
}

</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-01KV1957X3"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6005026713557890"
     crossorigin="anonymous"></script>
</head>

<body>

<header>
PYQPaper Blog
</header>

<div class="container">
<a class="back" href="index.html">← Back to Home</a>

<div id="blog-list"></div>

</div>

<script>

fetch("blog-data.json")
.then(res => res.json())
.then(data => {

let container = document.getElementById("blog-list");

data.forEach(blog => {

container.innerHTML += `
<div class="blog">

<a href="blog.html?id=${blog.id}">
${blog.title}
</a>

<p>${blog.description}</p>

</div>
`;

});

});

</script>

</body>
</html>
